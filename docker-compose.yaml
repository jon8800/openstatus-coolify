volumes:
    libsql-data:
    workflows-data:

services:
    libsql:
        image: ghcr.io/tursodatabase/libsql-server:latest
        ports:
            - "9080:8080"
        volumes:
            - libsql-data:/var/lib/sqld
        environment:
            SQLD_NODE: primary
        restart: unless-stopped

    tinybird-local:
        image: tinybirdco/tinybird-local:latest
        platform: linux/amd64
        environment:
            COMPATIBILITY_MODE: "1"
        restart: unless-stopped

    workflows:
        image: ghcr.io/openstatushq/openstatus-workflows:latest
        volumes:
            - workflows-data:/app/data
        environment:
            DATABASE_URL: http://libsql:8080
            DATABASE_AUTH_TOKEN: ""
            AUTH_SECRET: "ky7A+ktxQ3qA3WYOkRS0At44yu89c/2OrBVrpCg8fzc="
            AUTH_URL: https://uptime.eugenelominos.com
            NEXTAUTH_URL: https://uptime.eugenelominos.com
            AUTH_TRUST_HOST: "true"
            SELF_HOST: "true"
            NEXT_PUBLIC_URL: https://uptime.eugenelominos.com
            NODE_ENV: production
            FLY_REGION: self-hosted
            RESEND_API_KEY: placeholder
            AUTH_GITHUB_ID: "Ov23liwUnubrWftg3J12"
            AUTH_GITHUB_SECRET: "242b74d68045b8a77493a77a0a45b28050f92afa"
            STRIPE_SECRET_KEY: ""
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
            STRIPE_WEBHOOK_SECRET_KEY: ""
            PROJECT_ID_VERCEL: ""
            TEAM_ID_VERCEL: ""
            VERCEL_AUTH_BEARER_TOKEN: ""
            TINY_BIRD_API_KEY: ""
            TINYBIRD_URL: http://tinybird-local:7181
            CRON_SECRET: openstatus-self-hosted-cron-secret
            UNKEY_TOKEN: ""
            UNKEY_API_ID: ""
            UPSTASH_REDIS_REST_URL: ""
            UPSTASH_REDIS_REST_TOKEN: ""
            QSTASH_CURRENT_SIGNING_KEY: ""
            QSTASH_NEXT_SIGNING_KEY: ""
            QSTASH_TOKEN: ""
            QSTASH_URL: ""
            BLOB_READ_WRITE_TOKEN: ""
            SUPER_ADMIN_TOKEN: ""
            SCREENSHOT_SERVICE_URL: ""
            OPENSTATUS_INGEST_URL: ""
            NEXT_PUBLIC_OPENPANEL_CLIENT_ID: ""
            OPENPANEL_CLIENT_SECRET: ""
            NEXT_PUBLIC_SENTRY_DSN: ""
            SENTRY_AUTH_TOKEN: ""
