volumes:
    libsql-data:
    workflows-data:

x-common-env: &common-env
    DATABASE_URL: http://libsql:8080
    AUTH_SECRET: ${AUTH_SECRET:-changeme-generate-with-openssl-rand-base64-32}
    SELF_HOST: "true"
    NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3002}
    NODE_ENV: production
    FLY_REGION: self-hosted
    RESEND_API_KEY: ${RESEND_API_KEY:-placeholder}

services:
    libsql:
        image: ghcr.io/tursodatabase/libsql-server:latest
        volumes:
            - libsql-data:/var/lib/sqld
        environment:
            - SQLD_NODE=primary
        restart: unless-stopped

    tinybird-local:
        image: tinybirdco/tinybird-local:latest
        platform: linux/amd64
        environment:
            - COMPATIBILITY_MODE=1
        restart: unless-stopped

    workflows:
        image: ghcr.io/openstatushq/openstatus-workflows:latest
        volumes:
            - workflows-data:/app/data
        environment:
            <<: *common-env
            PORT: "3000"
        restart: unless-stopped

    server:
        image: ghcr.io/openstatushq/openstatus-server:latest
        environment:
            <<: *common-env
            PORT: "3000"
        restart: unless-stopped

    private-location:
        image: ghcr.io/openstatushq/openstatus-private-location:latest
        environment:
            DB_URL: http://libsql:8080
            TINYBIRD_URL: http://tinybird-local:7181
            GIN_MODE: release
            PORT: "8080"
        restart: unless-stopped

    checker:
        image: ghcr.io/openstatushq/openstatus-checker:latest
        environment:
            <<: *common-env
            PORT: "8080"
        restart: unless-stopped

    dashboard:
        image: ghcr.io/openstatushq/openstatus-dashboard:latest
        ports:
            - "3002:3000"
        environment:
            <<: *common-env
            PORT: "3000"
            HOSTNAME: 0.0.0.0
            AUTH_TRUST_HOST: "true"
        restart: unless-stopped

    status-page:
        image: ghcr.io/openstatushq/openstatus-status-page:latest
        ports:
            - "3003:3000"
        environment:
            <<: *common-env
            PORT: "3000"
            HOSTNAME: 0.0.0.0
            AUTH_TRUST_HOST: "true"
        restart: unless-stopped
