volumes:
    libsql-data:
    workflows-data:

services:
    libsql:
        image: ghcr.io/tursodatabase/libsql-server:latest
        ports:
            - "9080:8080"
        volumes:
            - libsql-data:/var/lib/sqld
        environment:
            SQLD_NODE: primary
        restart: unless-stopped

    tinybird-local:
        image: tinybirdco/tinybird-local:latest
        platform: linux/amd64
        ports:
            - "7181:7181"
        environment:
            COMPATIBILITY_MODE: "1"
        restart: unless-stopped

    tinybird-deploy:
        image: python:3.11-slim
        entrypoint: ["sh", "-c"]
        command:
            - |
              echo "Installing dependencies..."
              pip install -q tinybird-cli
              apt-get update -qq && apt-get install -y -qq git curl jq > /dev/null 2>&1
              echo "Waiting for TinyBird to be ready..."
              until curl -sf http://tinybird-local:7181/tokens > /dev/null 2>&1; do
                echo "  TinyBird not ready yet, waiting..."
                sleep 3
              done
              echo "Fetching TinyBird admin token..."
              TB_TOKEN=$(curl -s http://tinybird-local:7181/tokens | python3 -c "import sys,json; print(json.load(sys.stdin)['admin_token'])")
              echo "Token: $${TB_TOKEN:0:20}..."
              echo "Cloning OpenStatus repo..."
              git clone --depth 1 https://github.com/openstatusHQ/openstatus.git /app/openstatus
              cd /app/openstatus/packages/tinybird
              echo "Deploying TinyBird schema..."
              tb --host http://tinybird-local:7181 --token "$$TB_TOKEN" deploy --populate --force 2>&1 || true
              echo "TinyBird deploy complete!"
        depends_on:
            - tinybird-local
        restart: "no"

    workflows:
        image: ghcr.io/openstatushq/openstatus-workflows:latest
